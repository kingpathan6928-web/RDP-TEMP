name: DEVXRDP_PERSISTENT_PC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # Step 1: Repository code checkout karna
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Downloading necessary files
      - name: Downloading Utilities
        run: |
          Invoke-WebRequest -Uri "https://github.com/git-for-windows/git/releases/download/v2.44.0.windows.1/Git-2.44.0-64-bit.exe" -OutFile "git-installer.exe"
          # Aap yahan apne baaki tools ke download links bhi add kar sakte hain

      # Step 3: Sabse Naya Aur Latest Data Restore Karna
      - name: Restore Session Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\Google\Chrome\User Data
            C:\Users\runneradmin\Downloads
            C:\PersistentData
          key: rdp-v4-shared-${{ github.run_id }}
          restore-keys: |
            rdp-v4-shared-

      # Step 4: Tailscale Setup aur Connection (Hostname automatic unique rahega)
      - name: Connect to Tailscale
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          # Tailscale install aur up karne ka script
          # --hostname "DEVXRDP-${{ github.run_id }}" lagane se name clash nahi hoga

      # Step 5: RDP Configuration aur Setup
      - name: Configure RDP and User Session
        run: |
          # Aapka Windows RDP user aur password set karne ka code

      # Step 6: PC ko active rakhna (Loop)
      - name: Keep PC Alive
        run: |
          Write-Host "PC is running successfully..."
          # Yeh loop PC ko tab tak chalu rakhega jab tak aap cancel nahi karte
          Start-Sleep -Seconds 18000

      # Step 7: Kaam khatam hone par data ko 100% Naye Unique Name se Save Karna
      - name: Save Cache Always
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\Google\Chrome\User Data
            C:\Users\runneradmin\Downloads
            C:\PersistentData
          key: rdp-v4-shared-${{ github.run_id }}-${{ github.run_attempt }}
          
